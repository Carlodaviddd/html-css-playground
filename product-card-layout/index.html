<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Product Card Layout</title>
  </head>
  <body>
    <div class="container">
      <!-- Product 1 -->
      <div class="product">
        <img src="sneaker-1.jpg" alt="Shoe 1" class="product-img" />

        <div class="product-content">
          <p class="product-title">Nike Running Shoe</p>
          <div class="product-tags">
            <span class="tag">US 9</span>
            <span class="tag">Orange/White</span>
          </div>
          <p class="product-description">
            Lightweight running shoes with responsive cushioning and breathable
            materials for everyday runs.
          </p>

          <div class="product-price">
            <div class="price">
              <span>Price</span>
              <span>&#36;69.99</span>
            </div>
            <button class="btn">Add to cart</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
